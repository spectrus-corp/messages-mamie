<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages pour Mamie ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Dancing+Script:wght@400;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .title-font { font-family: 'Dancing+Script', cursive; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-rose-50 to-orange-50 min-h-screen">
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
            <div class="text-center mb-10">
                <div class="w-24 h-24 mx-auto bg-pink-100 rounded-full flex items-center justify-center text-5xl mb-4">💌</div>
                <h1 class="text-4xl title-font text-rose-600 mb-2">Messages pour Mamie</h1>
                <p class="text-gray-600">Choisis ton mode</p>
            </div>

            <div class="space-y-4">
                <button onclick="chooseMode('proche')" 
                        class="w-full py-6 text-xl font-medium bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-2xl shadow-lg hover:from-pink-500 hover:to-rose-500 transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-heart text-2xl"></i>
                    Je suis un proche
                </button>

                <button onclick="chooseMode('moi')" 
                        class="w-full py-6 text-xl font-medium bg-gradient-to-r from-amber-400 to-orange-400 text-white rounded-2xl shadow-lg hover:from-amber-500 hover:to-orange-500 transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-user-shield text-2xl"></i>
                    Je suis Moi (admin)
                </button>
            </div>

            <button onclick="showCreateSession()" class="mt-8 text-rose-500 hover:text-rose-600 text-sm w-full">
                Créer une nouvelle session
            </button>
        </div>
    </div>

    <!-- Login forms will be injected by JS -->

    <div id="main-app" class="hidden min-h-screen">
        <!-- Main content loaded by JS -->
    </div>

    <script src="script.js"></script>
</body>
</html>
